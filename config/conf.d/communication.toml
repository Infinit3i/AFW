# Communication

[[app]]
name = "discord"
binary = "Discord"
enabled = true
outbound = [
    { port = 443,   protocol = "tcp" },   # API/WebSocket
    { port = 443,   protocol = "udp" },   # WebRTC media
    { port = 80,    protocol = "tcp" },   # HTTP
    { port = 2053,  protocol = "tcp" },   # Cloudflare
    { port = 2083,  protocol = "tcp" },   # Cloudflare HTTPS
    { port = 8443,  protocol = "tcp" },   # Cloudflare
    { port = 3478,  protocol = "udp" },   # STUN (streaming/video)
    { port = 3478,  protocol = "tcp" },   # TURN (streaming/video)
    { port = 3479,  protocol = "udp" },   # STUN alternate
    { port = 5349,  protocol = "tcp" },   # TURN over TLS
    { port = 1,     range_end = 65535, protocol = "udp" },  # Voice/video/streaming
    { port = 50000, range_end = 65535, protocol = "tcp" },  # Streaming relay
]

