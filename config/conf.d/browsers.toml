# Browsers

[[app]]
name = "firefox"
binary = "firefox"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # HTTPS
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 8080, protocol = "tcp" },   # HTTP alternate
    { port = 8443, protocol = "tcp" },   # HTTPS alternate
    { port = 2053, protocol = "tcp" },   # Cloudflare
    { port = 2083, protocol = "tcp" },   # Cloudflare
    { port = 5228, protocol = "tcp" },   # Google services
]

