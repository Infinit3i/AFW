[[app]]
name = "tor-browser"
binary = "tor"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # TLS entry nodes
    { port = 80,   protocol = "tcp" },   # Non-TLS entry nodes
    { port = 9001, protocol = "tcp" },   # Tor relay ORPort
    { port = 9030, protocol = "tcp" },   # Tor directory
    { port = 9050, protocol = "tcp" },   # SOCKS proxy
    { port = 9150, protocol = "tcp" },   # Tor Browser SOCKS
]

