# Package Managers

[[app]]
name = "pacman"
binary = "pacman"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # HTTPS mirrors
    { port = 80,   protocol = "tcp" },   # HTTP mirrors
]

[[app]]
name = "yay"
binary = "yay"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # AUR/GitHub
    { port = 80,   protocol = "tcp" },
]

