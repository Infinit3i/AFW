# Media

[[app]]
name = "spotify"
binary = "spotify"
enabled = true
outbound = [
    { port = 443,   protocol = "tcp" },   # API/streaming
    { port = 80,    protocol = "tcp" },   # HTTP
    { port = 4070,  protocol = "tcp" },   # Spotify protocol
    { port = 8443,  protocol = "tcp" },   # HTTPS alternate
    { port = 57621, protocol = "udp" },   # Spotify Connect discovery
]

[[app]]
name = "obs"
binary = "obs"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # Streaming (Twitch/YouTube)
    { port = 80,   protocol = "tcp" },
    { port = 1935, protocol = "tcp" },   # RTMP streaming
    { port = 1936, protocol = "tcp" },   # RTMP alternate
]

[[app]]
name = "vlc"
binary = "vlc"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # HTTPS streams
    { port = 80,   protocol = "tcp" },   # HTTP streams
    { port = 554,  protocol = "tcp" },   # RTSP
    { port = 1755, protocol = "tcp" },   # MMS
    { port = 8000, protocol = "tcp" },   # Icecast
    { port = 8080, protocol = "tcp" },   # HTTP alternate
    { port = 5004, protocol = "udp" },   # RTP
    { port = 5005, protocol = "udp" },   # RTCP
]

[[app]]
