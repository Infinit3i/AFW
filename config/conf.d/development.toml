# Development

[[app]]
name = "code-oss"
binary = "code-oss"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # Marketplace/extensions/GitHub
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 22,   protocol = "tcp" },   # SSH (Remote-SSH extension)
    { port = 9418, protocol = "tcp" },   # Git protocol
    { port = 8443, protocol = "tcp" },   # HTTPS alternate
]

