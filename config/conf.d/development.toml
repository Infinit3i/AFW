# Development
#
# NOTE: Short-lived CLI tools (git, curl, wget, ssh, scp, rsync, pip, npm,
# cargo, go, python3, node) are NOT tracked here. Their ports are in the
# base config to avoid nftables rule churn that disrupts long-lived
# connections like WebSockets and SSE streams.
#
# Only long-running development apps with unique port needs are tracked.

[[app]]
name = "code-oss"
binary = "code-oss"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # Marketplace/extensions/GitHub
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 22,   protocol = "tcp" },   # SSH (Remote-SSH extension)
    { port = 9418, protocol = "tcp" },   # Git protocol
    { port = 8443, protocol = "tcp" },   # HTTPS alternate
]

