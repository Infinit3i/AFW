# Gaming

[[app]]
name = "steam"
binary = "steam"
enabled = true
outbound = [
    { port = 443,   protocol = "tcp" },   # Store/API
    { port = 80,    protocol = "tcp" },   # HTTP
    { port = 8443,  protocol = "tcp" },   # HTTPS alternate
    { port = 27015, range_end = 27050, protocol = "udp" },  # Game traffic
    { port = 27015, range_end = 27050, protocol = "tcp" },  # Game traffic
    { port = 4380,  protocol = "udp" },   # Steam P2P
    { port = 3478,  protocol = "udp" },   # STUN/NAT traversal
]

