# AFW - Application Firewall Configuration
#
# Base rules are always active. App rules are dynamic:
# ports open when the app starts, close when it exits.

[base]
# Always-allowed outbound ports
outbound = [
    { port = 53,   protocol = "udp" },   # DNS (UDP)
    { port = 53,   protocol = "tcp" },   # DNS (TCP)
    { port = 123,  protocol = "udp" },   # NTP
    { port = 443,  protocol = "tcp" },   # HTTPS
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 68,   protocol = "udp" },   # DHCP client
    { port = 67,   protocol = "udp" },   # DHCP server
    { port = 853,  protocol = "tcp" },   # DNS over TLS
    { port = 2053, protocol = "tcp" },   # Cloudflare DNS/HTTPS
    { port = 2083, protocol = "tcp" },   # Cloudflare HTTPS
    { port = 8443, protocol = "tcp" },   # HTTPS alternate (Cloudflare)
]
icmp = true
loopback = true

# ─── Browsers ────────────────────────────────────────────────

# Firefox
[[app]]
name = "firefox"
binary = "firefox"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # HTTPS
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 8080, protocol = "tcp" },   # HTTP alternate
    { port = 8443, protocol = "tcp" },   # HTTPS alternate
    { port = 2053, protocol = "tcp" },   # Cloudflare
    { port = 2083, protocol = "tcp" },   # Cloudflare
    { port = 5228, protocol = "tcp" },   # Google services
]

# LibreWolf
[[app]]
name = "librewolf"
binary = "librewolf"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },
    { port = 80,   protocol = "tcp" },
    { port = 8080, protocol = "tcp" },
    { port = 8443, protocol = "tcp" },
    { port = 2053, protocol = "tcp" },
    { port = 2083, protocol = "tcp" },
    { port = 5228, protocol = "tcp" },
]

# ─── Communication ───────────────────────────────────────────

# Discord
[[app]]
name = "discord"
binary = "Discord"
enabled = true
outbound = [
    { port = 443,   protocol = "tcp" },   # API/WebSocket
    { port = 80,    protocol = "tcp" },   # HTTP
    { port = 2053,  protocol = "tcp" },   # Cloudflare
    { port = 8443,  protocol = "tcp" },   # Cloudflare
    { port = 50000, range_end = 65535, protocol = "udp" },  # Voice/video
]

# Signal Desktop
[[app]]
name = "signal"
binary = "signal-deskto"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # API
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 10000, range_end = 20000, protocol = "udp" },  # Voice/video (TURN)
]

# Zoom
[[app]]
name = "zoom"
binary = "zoom"
enabled = true
outbound = [
    { port = 443,  protocol = "tcp" },   # API
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 8801, protocol = "udp" },   # Media
    { port = 8802, protocol = "udp" },   # Media
    { port = 3478, protocol = "udp" },   # STUN/TURN
    { port = 3479, protocol = "udp" },   # STUN/TURN
    { port = 5090, protocol = "tcp" },   # Zoom tunnel
    { port = 5091, protocol = "tcp" },   # Zoom tunnel
]

