# AFW - Application Firewall Configuration
#
# Base rules are always active.
# App rules live in conf.d/*.toml — they are loaded automatically.

[base]
# Always-allowed outbound ports
outbound = [
    { port = 53,   protocol = "udp" },   # DNS (UDP)
    { port = 53,   protocol = "tcp" },   # DNS (TCP)
    { port = 123,  protocol = "udp" },   # NTP
    { port = 443,  protocol = "tcp" },   # HTTPS
    { port = 80,   protocol = "tcp" },   # HTTP
    { port = 68,   protocol = "udp" },   # DHCP client
    { port = 67,   protocol = "udp" },   # DHCP server
    { port = 853,  protocol = "tcp" },   # DNS over TLS
    # Cloudflare ports (https://developers.cloudflare.com/fundamentals/reference/network-ports/)
    { port = 2053, protocol = "tcp" },   # Cloudflare DNS/HTTPS
    { port = 2083, protocol = "tcp" },   # Cloudflare HTTPS
    { port = 2087, protocol = "tcp" },   # Cloudflare HTTPS
    { port = 2096, protocol = "tcp" },   # Cloudflare HTTPS
    { port = 8443, protocol = "tcp" },   # Cloudflare HTTPS alternate
    { port = 8080, protocol = "tcp" },   # Cloudflare HTTP alternate
    { port = 8880, protocol = "tcp" },   # Cloudflare HTTP alternate
]
icmp = true
loopback = true
