name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Rust nightly (for eBPF)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Set stable as default
        run: rustup default stable

      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build eBPF programs
        run: cargo xtask build-ebpf --release

      - name: Check formatting
        run: cargo fmt --package afw -- --check

      - name: Run clippy
        run: cargo clippy --package afw -- -D warnings

      - name: Build userspace
        run: cargo build --package afw --release

      - name: Run tests
        run: cargo test --package afw
